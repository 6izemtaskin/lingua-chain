- name: Build Lingua Registry
  run: |
    rustup target add wasm32-unknown-unknown

    # Build the crate via manifest-path so cargo writes to the workspace target directory
    cargo build --manifest-path contracts/lingua-registry/Cargo.toml --target wasm32-unknown-unknown --release

    # Find the first .wasm under the workspace target tree (covers release/ and release/deps/)
    wasm=$(find target -type f -name '*.wasm' | head -n1 || true)

    if [ -z "$wasm" ]; then
      echo "No wasm found in target. Listing target for debugging:"
      find target -type f -maxdepth 6 -print
      exit 1
    fi

    echo "Found wasm: $wasm"
    cp "$wasm" lingua_registry.wasm
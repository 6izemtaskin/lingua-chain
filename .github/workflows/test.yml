name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        run: rustup target add wasm32-unknown-unknown

      - name: Build Lingua Registry
        run: |
          set -e
          # Crate'i doğrudan manifest yoluyla derle (workspace target'ına yazması için)
          cargo build --manifest-path contracts/lingua-registry/Cargo.toml --target wasm32-unknown-unknown --release

          # WASM dosyasını workspace'teki target klasöründe her nerede olursa olsun bul
          wasm=$(find target -type f -name '*.wasm' | head -n1 || true)

          if [ -z "$wasm" ]; then
            echo "HATA: WASM dosyası bulunamadı! Debug için target listesi:"
            find target -type f -maxdepth 6 -print
            exit 1
          fi

          echo "Bulunan wasm: $wasm"
          cp "$wasm" lingua_registry.wasm

      - name: Run Contract Tests
        run: cd contracts && cargo test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: cd linguachain-frontend && npm install
      - name: Build Frontend
        run: cd linguachain-frontend && npm run build
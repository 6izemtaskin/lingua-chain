name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        run: rustup target add wasm32-unknown-unknown
      - name: Build Lingua Registry
        run: |
          set -e
          # Build using the crate manifest so artifact goes to workspace target/...
          cargo build --manifest-path contracts/lingua-registry/Cargo.toml --target wasm32-unknown-unknown --release

          # Find the produced wasm
          WASM=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name '*.wasm' -print -quit || true)
          if [ -z "$WASM" ]; then
            echo "WASM not found — diagnostic info:"
            echo "workspace target listing:"
            ls -la target || true
            echo "wasm arch listing:"
            ls -la target/wasm32-unknown-unknown/release || true
            exit 1
          fi

          # Kopyala repo köküne
          cp "$WASM" lingua_registry.wasm
          echo "Copied $WASM -> lingua_registry.wasm"

      - name: Run Contract Tests
        run: cd contracts && cargo test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: cd linguachain-frontend && npm install
      - name: Build Frontend
        run: cd linguachain-frontend && npm run build
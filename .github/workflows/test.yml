name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        run: rustup target add wasm32-unknown-unknown

      - name: Build Lingua Registry
        run: |
          # Klasörün içine girmeden, doğrudan manifest yoluyla derle
          # Böylece target klasörü kök dizinde oluşur
          cargo build --manifest-path contracts/lingua-registry/Cargo.toml --target wasm32-unknown-unknown --release
          
          # HATA AYIKLAMA: target klasöründe neler var?
          echo "Target klasörünün içeriği:"
          find target -maxdepth 4 -name "*.wasm" -ls
          
          # WASM dosyasını bul ve kopyala
          wasm=$(find target -name "*.wasm" | head -n1)
          if [ -z "$wasm" ]; then
            echo "HATA: .wasm dosyası üretilmedi!"
            exit 1
          fi
          cp "$wasm" lingua_registry.wasm
          echo "Dosya kopyalandı: $wasm -> lingua_registry.wasm"

      - name: Run Contract Tests
        run: cd contracts && cargo test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: cd linguachain-frontend && npm install
      - name: Build Frontend
        run: cd linguachain-frontend && npm run build
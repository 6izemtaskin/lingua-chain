name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "linguachain-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "linguachain-frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: linguachain-frontend

jobs:
  build-and-test:
    name: Install, Lint, Test, Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: linguachain-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: linguachain-frontend/dist
          retention-days: 7